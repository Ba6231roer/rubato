tools:
  builtin:
    enabled: true
    spawn_agent:
      enabled: true
    shell_tool:
      enabled: true
      safe_mode: true
    file_tools:
      enabled: true
      permission_mode: "ask"
      permissions:
        "read:*": "allow"
        "list:*": "allow"
        "search:*": "allow"
        "exists:*": "allow"
        "write:*.md": "ask"
        "write:*.py": "ask"
        "write:*.txt": "allow"
        "write:*.log": "allow"
        "delete:*": "deny"
        "move:*": "ask"
      audit: true
  
  mcp:
    auto_connect: true
  
  skills: {}
  
  tool_docs:
    auto_inject: true
    include_examples: true
