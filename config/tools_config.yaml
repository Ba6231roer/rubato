# 文件工具配置
# 配置文件工具的权限和审计设置

file_tools:
  # 是否启用文件工具
  # true: 启用文件工具，Agent 可以执行文件操作
  # false: 禁用文件工具，Agent 无法执行任何文件操作
  enabled: true
  
  # 全局权限模式（已弃用，建议使用 default_permissions）
  # 可选值：allow, ask, deny
  # - allow: 允许操作，无需用户确认
  # - ask: 允许操作，但需要用户确认
  # - deny: 拒绝操作
  permission_mode: "ask"
  
  # 默认操作权限
  # 当操作类型未在 custom_permissions 中配置时使用此权限
  # 可选值：allow, ask, deny
  default_permissions: "ask"
  
  # 自定义权限规则
  # 格式：<operation>:<pattern>: <mode>
  # - operation: 操作类型（read, write, delete, list, search, exists, copy, move, mkdir, replace）
  # - pattern: 文件模式（支持通配符，* 表示所有文件）
  # - mode: 权限模式（allow, ask, deny）
  #
  # 权限优先级：
  # 1. 自定义权限（custom_permissions）优先于默认权限
  # 2. 更具体的模式优先于更通用的模式
  custom_permissions:
    # 读取操作 - 默认允许
    "read:*": "allow"
    
    # 列出目录 - 默认允许
    "list:*": "allow"
    
    # 搜索内容 - 默认允许
    "search:*": "allow"
    
    # 检查存在 - 默认允许
    "exists:*": "allow"
    
    # 写入 Markdown 文件 - 需要确认
    "write:*.md": "ask"
    
    # 写入 Python 文件 - 需要确认
    "write:*.py": "ask"
    
    # 写入文本文件 - 允许
    "write:*.txt": "allow"
    
    # 写入日志文件 - 允许
    "write:*.log": "allow"
    
    # 删除操作 - 默认拒绝（危险操作）
    "delete:*": "deny"
    
    # 移动操作 - 需要确认（危险操作）
    "move:*": "ask"
  
  # 是否启用审计日志
  # true: 记录所有文件操作到日志文件
  # false: 不记录审计日志
  # 
  # 审计日志位置：logs/file_tools_audit.log
  # 日志格式：JSON，每行一条记录
  audit: true

# 默认操作权限说明：
# ┌─────────────┬────────┬────────────────────────────────┐
# │ 操作类型     │ 默认权限 │ 说明                            │
# ├─────────────┼────────┼────────────────────────────────┤
# │ read        │ allow  │ 读取文件内容                     │
# │ list        │ allow  │ 列出目录内容                     │
# │ exists      │ allow  │ 检查文件是否存在                 │
# │ search      │ allow  │ 搜索文件内容                     │
# │ write       │ ask    │ 写入文件内容                     │
# │ replace     │ ask    │ 替换文件内容                     │
# │ copy        │ ask    │ 复制文件                        │
# │ mkdir       │ ask    │ 创建目录                        │
# │ move        │ ask    │ 移动文件（危险操作，需额外确认）    │
# │ delete      │ deny   │ 删除文件（危险操作，默认拒绝）     │
# └─────────────┴────────┴────────────────────────────────┘

# 配置示例：
#
# 示例 1: 只读模式
# file_tools:
#   enabled: true
#   default_permissions: "deny"
#   custom_permissions:
#     "read:*": "allow"
#     "list:*": "allow"
#     "search:*": "allow"
#     "exists:*": "allow"
#   audit: true
#
# 示例 2: 宽松模式（不推荐用于生产环境）
# file_tools:
#   enabled: true
#   default_permissions: "allow"
#   custom_permissions:
#     "delete:*": "deny"
#   audit: true
#
# 示例 3: 严格模式
# file_tools:
#   enabled: true
#   default_permissions: "ask"
#   custom_permissions:
#     "read:*": "allow"
#     "list:*": "allow"
#     "write:*": "ask"
#     "delete:*": "deny"
#   audit: true
#
# 示例 4: 允许特定目录写入
# file_tools:
#   enabled: true
#   default_permissions: "ask"
#   custom_permissions:
#     "read:*": "allow"
#     "write:output/*": "allow"
#     "write:temp/*": "allow"
#     "write:logs/*": "allow"
#     "delete:*": "deny"
#   audit: true
#
# 示例 5: 禁用文件工具
# file_tools:
#   enabled: false
