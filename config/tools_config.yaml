tools:
  builtin:
    enabled: true
    spawn_agent:
      enabled: true
    shell_tool:
      enabled: true
      safe_mode: true
    file_tools:
      enabled: true
      permission_mode: "ask"
      permissions:
        "read:*": "allow"
        "list:*": "allow"
        "search:*": "allow"
        "exists:*": "allow"
        "write:*.md": "ask"
        "write:*.py": "ask"
        "write:*.txt": "allow"
        "write:*.log": "allow"
        "delete:*": "deny"
        "move:*": "ask"
      audit: true
  
  mcp:
    config_file: mcp_config.yaml
    auto_connect: true
    cache_ttl: 300
  
  skills:
    config_file: skills_config.yaml
    auto_load_metadata: true
  
  tool_docs:
    auto_inject: true
    inject_position: "after_prompt"
    format: "markdown"
    include_examples: true
