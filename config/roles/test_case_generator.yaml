name: test-case-generator
description: 测试案例生成者 - 负责根据需求生成测试案例
system_prompt_file: prompts/roles/test_case_generator.txt
model:
  inherit: true
execution:
  max_context_tokens: 200000
  timeout: 300
  recursion_limit: 1000
  sub_agent_recursion_limit: 500
tools:
  builtin:
    spawn_agent: true
    shell_tool: true
    file_tools:
      enabled: true
      permissions:
        "read:*": "allow"
        "write:*.md": "allow"
        "write:*.txt": "allow"
  mcp:
    enabled: false
  skills:
    - playwright-cli

metadata:
  version: "1.0"
  author: "Rubato Team"
