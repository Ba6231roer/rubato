name: test-case-generator
description: 测试案例生成者 - 负责根据需求生成测试案例
system_prompt_file: prompts/roles/test_case_generator.txt

model:
  inherit: false
  provider: "openai"
  name: "deepseek-chat"
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: https://api.deepseek.com/v1
  temperature: 0.8
  max_tokens: 80000

execution:
  max_context_tokens: 80000
  timeout: 300
  recursion_limit: 100
  sub_agent_recursion_limit: 50

tools:
  builtin:
    spawn_agent: true
    shell_tool: true
    file_tools:
      enabled: true
      permissions:
        "read:*": "allow"
        "write:*.md": "allow"
        "write:*.txt": "allow"
        "mkdir:*": "allow"

metadata:
  version: "1.0"
  author: "Rubato Team"
