name: test-case-executor
description: 测试案例执行者 - 负责执行自动化测试任务
system_prompt_file: prompts/roles/test_case_executor.txt
model:
  inherit: true
execution:
  max_context_tokens: 80000
  timeout: 300
  recursion_limit: 100
  sub_agent_recursion_limit: 50
available_tools:
  - shell_tool
  - spawn_agent
  - browser_navigate
  - browser_click
  - browser_type
  - browser_snapshot
metadata:
  version: "1.0"
  author: "Rubato Team"
