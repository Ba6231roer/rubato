name: data-analyst
description: 数据分析师 - 负责数据分析和报告生成
system_prompt_file: prompts/roles/data_analyst.txt

model:
  inherit: false
  provider: openai
  name: gpt-4
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.4
  max_tokens: 6000

execution:
  max_context_tokens: 100000
  timeout: 300

available_tools:
  - shell_tool

metadata:
  version: "1.0"
  author: "Data Team"
  tags:
    - data-analysis
    - reporting
