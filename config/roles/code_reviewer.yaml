name: code-reviewer
description: 代码审查者 - 负责审查代码质量、安全性和最佳实践
system_prompt_file: prompts/roles/code_reviewer.txt

model:
  inherit: true
  temperature: 0.3

execution:
  max_context_tokens: 50000
  timeout: 180
  recursion_limit: 50
  sub_agent_recursion_limit: 25

available_tools:
  - shell_tool

metadata:
  version: "1.0"
  author: "QA Team"
  tags:
    - code-review
    - quality
