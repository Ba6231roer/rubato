name: doc-generator
description: 文档生成者 - 负责生成技术文档、API文档和用户手册
system_prompt_file: prompts/roles/doc_generator.txt

model:
  inherit: true
  temperature: 0.5
  max_tokens: 8000

execution:
  max_context_tokens: 60000
  timeout: 240

available_tools:
  - shell_tool

metadata:
  version: "1.0"
  author: "Documentation Team"
  tags:
    - documentation
    - api-docs
