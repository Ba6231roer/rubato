name: test-suite-executor
description: 测试案例集执行者 - 负责批量执行测试案例集
system_prompt_file: prompts/roles/test_suite_executor.txt
model:
  inherit: true
execution:
  max_context_tokens: 200000
  timeout: 90000
  recursion_limit: 1000
  sub_agent_recursion_limit: 500
tools:
  builtin:
    spawn_agent: true
    shell_tool: true
    file_tools:
      enabled: true
      permissions:
        "read:*": "allow"
        "write:*.md": "allow"
        "write:*.txt": "allow"
        "write:webui_scripts/*": "allow"
        "write:*.yaml": "allow"
  mcp:
    enabled: false
  skills:
    - playwright-cli
metadata:
  version: "1.0"
  author: "Rubato Team"
