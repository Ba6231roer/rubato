name: api-tester
description: API测试者 - 负责执行API接口测试和验证
system_prompt_file: prompts/roles/api_tester.txt

model:
  inherit: true
  temperature: 0.2

execution:
  max_context_tokens: 40000
  timeout: 120
  recursion_limit: 30

available_tools:
  - shell_tool
  - spawn_agent

metadata:
  version: "1.0"
  author: "QA Team"
  tags:
    - api-testing
    - integration
