name: bs-ui-kb-orchestrator
description: 系统知识库orchestrator - 负责分析并编排系统知识库任务
system_prompt_file: prompts/roles/bs_ui_kb_orchestrator.txt
model:
  inherit: true
execution:
  max_context_tokens: 120000
  timeout: 300
  recursion_limit: 1000
  sub_agent_recursion_limit: 500
tools:
  builtin:
    spawn_agent: true
    shell_tool: true
    file_tools:
      enabled: true
      permissions:
        "read:*": "allow"
        "write:*.md": "allow"
        "write:*.txt": "allow"
  mcp:
    enabled: false
  skills:
    - playwright-cli
metadata:
  version: "1.0"
  author: "Rubato Team"
